name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: canonical/cloud-init
          path: cloud-init
      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends $(cat .github/apt-packages.txt)
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      - run: goreleaser build --snapshot
      - run: mise run lint
      - run: mise run test
      - run: mise run test-conformance
        env:
          CLOUD_INIT_DIR: ${{ github.workspace }}/cloud-init
