[settings]
lockfile = true
idiomatic_version_file_enable_tools = ["go"]

[tasks.build]
description = "Build all packages"
run = "go build ./..."

[tasks.test]
description = "Run unit tests"
run = "go test -race ./..."

[tasks.test-conformance]
description = "Run EC2 IMDS conformance suite (set CLOUD_INIT_DIR to override path)"
dir = "tests/conformance"
run = """
PYTHONPATH=${CLOUD_INIT_DIR:-$HOME/git/cloud-init} uv run --project . pytest -v --tb=short .
"""

[tasks.generate]
description = "Run go generate for XDP bindings"
run = "go generate -tags ignore ./internal/xdp/..."

[tasks.lint]
run = "golangci-lint run"

[tasks.fmt]
run = "golangci-lint fmt"

[tasks.snapshot]
run = "goreleaser release --snapshot --clean"

[tasks.pinata]
run = "pinata .github/workflows"

[tasks.tag-release]
description = "Tag the next semantic version and push to origin"
run = """
tag=$(svu next)
git tag "$tag"
git push origin "$tag"
"""

[tools]
"go:github.com/goreleaser/goreleaser/v2" = "latest"
"go:github.com/caarlos0/pinata" = "latest"
"go:github.com/caarlos0/svu" = "latest"
golangci-lint = "latest"
python = "latest"
uv = "latest"
