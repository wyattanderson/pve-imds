# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy
    - mise run generate

builds:
  - main: ./cmd/pve-imds
    ldflags:
      - -X main.version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64

archives:
  - formats: binary
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}-
      {{- tolower .Os }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

nfpms:
  - maintainer: Wyatt Anderson <wanderson@gmail.com>
    license: MIT
    homepage: https://github.com/wyattanderson/pve-imds
    description: >-
      An OpenStack and EC2 IMDS (Instance Metadata Service) compatible metadata
      service for virtual machines running in Proxmox.
    formats:
      - deb
    suggests:
      - proxmox-ve
    bindir: /usr/sbin
    contents:
      - src: release/linux/usr/lib/systemd/system/pve-imds.service
        dst: /usr/lib/systemd/system/pve-imds.service
        file_info:
          mode: 0644
    scripts:
      postinstall: release/scripts/deb/postinstall.sh
      preremove: release/scripts/deb/preremove.sh
    deb:
      compression: zstd

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).